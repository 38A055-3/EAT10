<!DOCTYPE html>
<html>
<head>
<style>
body {
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: gray;
}
.app-container {
    width: 100%;
    max-width: 900px;
    height: 100%;
    max-height: 900px;
    position: relative;
    background: white;
}
.screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
}
.screen > * {
    flex-shrink: 0;
}
.btn {
    order: 99;
    margin-top: auto;
    margin-bottom: 40px;
    height: 50px;
    width: 200px;
    background: red;
}
.content {
    width: 100%;
    height: 1200px;
    background: linear-gradient(blue, green);
}
</style>
</head>
<body>
    <div class="app-container">
        <div class="screen">
            <div class="btn">Button</div>
            <div class="content">Content</div>
        </div>
    </div>
</body>
</html>
