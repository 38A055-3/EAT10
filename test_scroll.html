<!DOCTYPE html>
<html>
<head>
<style>
.screen {
    width: 300px;
    height: 400px;
    border: 1px solid black;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    justify-content: flex-start;
}
.content {
    height: 800px; /* Taller than container */
    background: lightblue;
}
.btn {
    order: 99;
    margin-top: auto;
    margin-bottom: 40px;
    height: 50px;
    background: red;
}
</style>
</head>
<body>
<div class="screen">
    <div class="btn">Button</div>
    <div class="content">Content</div>
</div>
</body>
</html>
