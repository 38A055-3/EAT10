<!DOCTYPE html>
<html style="height: 100%;">
<body style="height: 100%; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; background: blue;">
    <div style="width: 100%; max-width: 900px; height: 100%; max-height: 900px; position: relative; background: white;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; overflow-x: hidden;">
            <style>
                .screen > * { flex-shrink: 0; }
            </style>
            <div class="screen" style="display: contents;">
                <button style="order: 99; margin-top: auto; margin-bottom: 40px; height: 50px;">戻る</button>
                <h2 style="height: 50px; margin-bottom: 30px;">Title</h2>
                <div style="height: 1200px; width: 100%; background: red;">Grid</div>
            </div>
        </div>
    </div>
</body>
</html>
